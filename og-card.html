<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OG card source — davidmullett.com</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500&display=block" rel="stylesheet">
<style>
  *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1200px;
    height: 630px;
    background: #f3f0e7;
    overflow: hidden;
  }
  body { position: relative; }

  /* SPIRAL FIGURE — 780px, geometric center at (860, 315).
     Bleeds off top, bottom, and right edges. SVG top-left at (470, -75). */
  .figure {
    position: absolute;
    left: 470px;
    top: -75px;
    width: 780px;
    height: 780px;
    pointer-events: none;
  }
  .figure svg { display: block; overflow: visible; width: 100%; height: 100%; }

  /* MASTHEAD — wordmark only, flush left at x=120, block top y=96 */
  .wordmark {
    position: absolute;
    left: 120px;
    top: 96px;
    font-family: 'IBM Plex Mono', 'Courier New', monospace;
    font-weight: 500;
    font-size: 42px;
    letter-spacing: 0.17em;
    color: #1a1710;
    line-height: 1;
    margin-right: -0.17em;
  }
</style>
</head>
<body>
  <div class="figure" aria-hidden="true">
    <svg viewBox="-8 -8 96 96" xmlns="http://www.w3.org/2000/svg">

      <circle cx="41" cy="42" r="1.6" fill="#1a1710"/>
    </svg>
  </div>
  <span class="wordmark">DAVID MULLETT</span>
</body>
</html>
