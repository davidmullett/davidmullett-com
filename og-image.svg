<?xml version="1.0" encoding="UTF-8"?>
<!-- =====================================================================
     davidmullett.com — social card (Open Graph) · editable source
     Size: 1200 × 630 (standard OG / Twitter large-summary card)
     Brand tokens: paper #f3f0e7 · ink #1a1710 · mint #1faa5e
     Type: Source Serif 4 (serif headline) · IBM Plex Mono (wordmark + caption)

     TO EDIT
       • Headline ........ <text class="headline"> below (3 lines, edit freely)
       • Italic phrase ... wrap words in <tspan class="it"> … </tspan>
       • Caption ......... <text class="caption"> (kept in ink/black, not amber)
       • Domain .......... <text class="domain"> (right-aligned)

     TO EXPORT TO PNG (fonts load via the @import in <style>)
       Headless Chrome:  render this SVG in a 1200×630 page and screenshot, OR
       resvg with fonts installed:  resvg og-image.svg og-image.png
       (Source Serif 4 + IBM Plex Mono must be available to the renderer.)
     ===================================================================== -->
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="David Mullett — social card">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;1,8..60,400;1,8..60,500&amp;family=IBM+Plex+Mono:wght@400;500&amp;display=swap');
    .wordmark { font-family:'IBM Plex Mono', ui-monospace, monospace; font-size:34px; font-weight:500; letter-spacing:0.17em; fill:#1a1710; }
    .headline { font-family:'Source Serif 4', Georgia, serif; font-size:70px; font-weight:400; fill:#1a1710; }
    .headline .it { font-style:italic; }
    .caption  { font-family:'IBM Plex Mono', ui-monospace, monospace; font-size:19px; font-weight:400; letter-spacing:0.06em; fill:#8c8880; }
    .domain   { font-family:'IBM Plex Mono', ui-monospace, monospace; font-size:19px; font-weight:500; letter-spacing:0.04em; fill:#1a1710; }
  </style>

  <!-- paper -->
  <rect width="1200" height="630" fill="#f3f0e7"/>

  <!-- mark + wordmark (top-left) -->
  <g transform="translate(88,70) scale(0.8)">
    <path d="M40,40 Q40,8 66,14 Q82,25 80,48 Q74,69 50,74 Q23,78 9,56 Q-4,34 8,14 Q20,-4 42,2 Q66,8 76,30 Q84,54 70,68 Q54,82 34,80 Q14,78 6,62 Q-2,46 8,34 Q18,22 34,20 Q52,18 60,34 Q68,50 58,62 Q48,74 36,70 Q24,66 22,54 Q20,44 28,38 Q36,32 44,36 Q52,40 50,48 Q48,56 42,54 Q38,52 38,48 Q38,44 41,42"
          fill="none" stroke="#1a1710" stroke-width="3" stroke-linecap="round"/>
    <circle cx="41" cy="42" r="4.2" fill="#1faa5e"/>
  </g>
  <text class="wordmark" x="170" y="116">DAVID MULLETT</text>

  <!-- headline -->
  <text class="headline" x="86" y="272">I design and study the digital</text>
  <text class="headline" x="86" y="356">systems that shape behavior</text>
  <text class="headline" x="86" y="440">at scale &#8201;&#8212; <tspan class="it">and how they fail.</tspan></text>

  <!-- divider -->
  <line x1="88" y1="512" x2="1112" y2="512" stroke="#d8d4c8" stroke-width="1"/>

  <!-- caption + domain (same baseline) -->
  <text class="caption" x="88" y="556">INDEPENDENT RESEARCHER &#183; FORMER META REALITY LABS DESIGN LEAD</text>
  <text class="domain" x="1112" y="556" text-anchor="end">davidmullett.com</text>
</svg>
